<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - UrbanThreads</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 nav-glass">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 md:h-20">
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-2xl font-bold bg-gradient-to-r from-gray-900 to-gray-600 bg-clip-text text-transparent">URBANTHREADS</a>
                </div>
                <div class="flex items-center space-x-5">
                    <a href="cart.html" class="text-gray-600 hover:text-black transition">
                        <i class="fas fa-arrow-left mr-2"></i> Back to Cart
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Progress Steps -->
        <div class="flex justify-center mb-8">
            <div class="flex items-center space-x-4">
                <div class="flex items-center text-green-600">
                    <div class="w-8 h-8 rounded-full bg-green-600 text-white flex items-center justify-center">✓</div>
                    <span class="ml-2">Cart</span>
                </div>
                <div class="w-16 h-0.5 bg-green-600"></div>
                <div class="flex items-center text-black font-semibold">
                    <div class="w-8 h-8 rounded-full bg-black text-white flex items-center justify-center">2</div>
                    <span class="ml-2">Checkout</span>
                </div>
                <div class="w-16 h-0.5 bg-gray-300"></div>
                <div class="flex items-center text-gray-400">
                    <div class="w-8 h-8 rounded-full bg-gray-300 text-white flex items-center justify-center">3</div>
                    <span class="ml-2">Payment</span>
                </div>
            </div>
        </div>

        <h1 class="text-3xl md:text-4xl font-bold mb-8 flex items-center gap-3">
            <i class="fas fa-credit-card text-gray-700"></i>
            Checkout
        </h1>
        
        <div class="grid lg:grid-cols-2 gap-8">
            <!-- Left Column - Forms -->
            <div>
                <!-- Delivery Address -->
                <div class="bg-white rounded-2xl p-6 shadow-lg mb-6">
                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <i class="fas fa-map-marker-alt text-red-500"></i>
                        Delivery Address
                    </h3>
                    <form id="addressForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Full Name *</label>
                            <input type="text" id="fullName" placeholder="Enter your full name" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-black focus:ring-2 focus:ring-black/20" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number *</label>
                            <input type="tel" id="phone" placeholder="10-digit mobile number" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-black focus:ring-2 focus:ring-black/20" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Street Address *</label>
                            <input type="text" id="address" placeholder="House number, building name, street" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-black focus:ring-2 focus:ring-black/20" required>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">City *</label>
                                <input type="text" id="city" placeholder="City" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-black focus:ring-2 focus:ring-black/20" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">PIN Code *</label>
                                <input type="text" id="zip" placeholder="6-digit PIN code" maxlength="6" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-black focus:ring-2 focus:ring-black/20" required>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Landmark (Optional)</label>
                            <input type="text" id="landmark" placeholder="Near any famous landmark" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-black focus:ring-2 focus:ring-black/20">
                        </div>
                    </form>
                </div>
                
                <!-- Payment Method -->
                <div class="bg-white rounded-2xl p-6 shadow-lg">
                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <i class="fas fa-wallet text-green-600"></i>
                        Payment Method
                    </h3>
                    <div class="space-y-3">
                        <label class="flex items-center space-x-3 p-4 border rounded-xl cursor-pointer hover:border-black transition">
                            <input type="radio" name="payment" value="cod" checked class="w-5 h-5">
                            <i class="fas fa-money-bill-wave text-2xl text-green-600"></i>
                            <div class="flex-1">
                                <span class="font-semibold">Cash on Delivery</span>
                                <p class="text-sm text-gray-500">Pay when you receive the order</p>
                            </div>
                        </label>
                        <label class="flex items-center space-x-3 p-4 border rounded-xl cursor-pointer hover:border-black transition">
                            <input type="radio" name="payment" value="card" class="w-5 h-5">
                            <i class="fab fa-cc-visa text-2xl text-blue-600"></i>
                            <div class="flex-1">
                                <span class="font-semibold">Credit/Debit Card</span>
                                <p class="text-sm text-gray-500">Visa, Mastercard, RuPay</p>
                            </div>
                        </label>
                        <label class="flex items-center space-x-3 p-4 border rounded-xl cursor-pointer hover:border-black transition">
                            <input type="radio" name="payment" value="upi" class="w-5 h-5">
                            <i class="fas fa-mobile-alt text-2xl text-purple-600"></i>
                            <div class="flex-1">
                                <span class="font-semibold">UPI / NetBanking</span>
                                <p class="text-sm text-gray-500">Google Pay, PhonePe, Paytm</p>
                            </div>
                        </label>
                    </div>
                </div>
            </div>
            
            <!-- Right Column - Order Summary -->
            <div>
                <div class="bg-white rounded-2xl p-6 shadow-xl sticky top-24 border border-gray-100">
                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <i class="fas fa-shopping-bag"></i>
                        Order Summary
                    </h3>
                    
                    <div id="orderItems" class="space-y-3 max-h-80 overflow-auto mb-4"></div>
                    
                    <div class="border-t pt-4 space-y-2">
                        <div class="flex justify-between text-gray-600">
                            <span>Subtotal</span>
                            <span id="checkoutSubtotal">₹0</span>
                        </div>
                        <div class="flex justify-between text-green-600">
                            <span>Discount</span>
                            <span id="checkoutDiscount">-₹0</span>
                        </div>
                        <div class="flex justify-between text-gray-600">
                            <span>Delivery Charges</span>
                            <span id="checkoutDelivery">Free</span>
                        </div>
                        <div class="flex justify-between text-gray-600">
                            <span>Platform Fee</span>
                            <span>₹20</span>
                        </div>
                        <div class="flex justify-between font-bold text-xl pt-3 border-t">
                            <span>Total Amount</span>
                            <span id="checkoutTotal" class="text-2xl text-green-600">₹0</span>
                        </div>
                    </div>
                    
                    <div class="mt-6 space-y-3">
                        <button onclick="placeOrder()" class="w-full bg-black text-white py-3 rounded-full font-semibold hover:bg-gray-800 transition transform hover:scale-105">
                            Place Order <i class="fas fa-check-circle ml-2"></i>
                        </button>
                        <p class="text-center text-xs text-gray-500">
                            <i class="fas fa-shield-alt mr-1"></i> Your order is secured and encrypted
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="fixed bottom-4 right-4 z-50"></div>

    <script src="js/utils.js"></script>
    <script src="js/cart.js"></script>
    <script>
        function formatPrice(price) {
            return '₹' + price.toLocaleString('en-IN');
        }

        function loadOrderSummary() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const originalTotal = cart.reduce((sum, item) => sum + (item.originalPrice * item.quantity), 0);
            const discount = originalTotal - subtotal;
            const delivery = subtotal < 1999 ? 100 : 0;
            const platformFee = 20;
            const total = subtotal + delivery + platformFee;
            
            document.getElementById('orderItems').innerHTML = cart.map(item => `
                <div class="flex justify-between items-center text-sm py-2 border-b">
                    <div class="flex items-center gap-2">
                        <img src="${item.image}" class="w-12 h-12 object-cover rounded">
                        <div>
                            <div class="font-semibold">${item.name}</div>
                            <div class="text-gray-500 text-xs">Qty: ${item.quantity} | Size: ${item.size}</div>
                        </div>
                    </div>
                    <div class="font-semibold">${formatPrice(item.price * item.quantity)}</div>
                </div>
            `).join('');
            
            if (cart.length === 0) {
                showToast('Your cart is empty!', 'error');
                setTimeout(() => location.href = 'products.html', 1500);
            }
            
            document.getElementById('checkoutSubtotal').innerHTML = formatPrice(subtotal);
            document.getElementById('checkoutDiscount').innerHTML = `-${formatPrice(discount)}`;
            document.getElementById('checkoutDelivery').innerHTML = delivery === 0 ? 'Free' : formatPrice(delivery);
            document.getElementById('checkoutTotal').innerHTML = formatPrice(total);
        }
        
        function placeOrder() {
            const name = document.getElementById('fullName')?.value;
            const phone = document.getElementById('phone')?.value;
            const address = document.getElementById('address')?.value;
            const city = document.getElementById('city')?.value;
            const zip = document.getElementById('zip')?.value;
            
            if (!name || !phone || !address || !city || !zip) {
                showToast('Please fill all required fields', 'error');
                return;
            }
            
            if (!/^\d{10}$/.test(phone)) {
                showToast('Please enter valid 10-digit phone number', 'error');
                return;
            }
            
            if (!/^\d{6}$/.test(zip)) {
                showToast('Please enter valid 6-digit PIN code', 'error');
                return;
            }
            
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (cart.length === 0) {
                showToast('Your cart is empty!', 'error');
                return;
            }
            
            // Save order to localStorage
            const order = {
                id: 'ORD' + Date.now(),
                date: new Date().toLocaleString(),
                items: cart,
                total: document.getElementById('checkoutTotal').innerHTML,
                address: { name, phone, address, city, zip },
                payment: document.querySelector('input[name="payment"]:checked').value
            };
            
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));
            
            // Clear cart
            localStorage.removeItem('cart');
            updateCounts();
            
            showToast('Order placed successfully! 🎉', 'success');
            setTimeout(() => {
                location.href = 'index.html';
            }, 2000);
        }
        
        loadOrderSummary();
        updateCounts();
    </script>
</body>
</html>
